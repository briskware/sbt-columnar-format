name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: Test (Scala ${{ matrix.scala }}, Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]
        scala: ["2.12.20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.coursier/cache
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/plugins.sbt', '**/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Run tests with coverage
        run: sbt test coverageReport

      - name: Upload coverage report
        if: matrix.java == '17'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-scala${{ matrix.scala }}

          path: target/**/scoverage-report/
          retention-days: 14